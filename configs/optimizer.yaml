run_dir: runs

models:
  extraction:
    provider: mock
    model: mock-model
    # For real multimodal extraction:
    # provider: openai_compatible
    # base_url: https://api.example.com/v1
    # api_key_env: EXTRACTION_API_KEY
    # model: vision-model-name
  optimizer:
    provider: mock
    model: mock-model
    # For real optimization / analysis:
    # provider: openai_compatible
    # base_url: https://api.example.com/v1
    # api_key_env: OPTIMIZER_API_KEY
    # model: optimizer-model-name

text_optimization:
  max_rounds: 10
  batch_size: 24

compression:
  extraction_line_budget: null
  analysis_line_budget: null
  llm_enabled: false

analysis:
  json_repair_enabled: false
  json_repair_max_attempts: 1

patch_merge:
  semantic_enabled: false
  root_audit_enabled: false

fewshot:
  enabled: false
  max_rounds: 5
  max_slots: 5
  min_accuracy_delta: 0.0

dynamic_validation:
  batch_size: 48
  min_label_count: 1
  cover_difficulty_bins: true
  recent_window_rounds: 3
  max_recent_selections: 1

strict_mode:
  allow_net_gain_tradeoff: false

patch_repair:
  enabled: false
  max_attempts: 1
health:
  enabled: true
snapshots:
  enabled: true
evaluation:
  voting_enabled: true
  vote_rounds: 3
execution:
  max_workers: 1
contribution:
  feedback_enabled: true
debug:
  enabled: true
