# PR4 端到端 Smoke 测试配置
# 用于验证 MMAP 重构版完整三阶段流程可运行、可验收

run:
  seed: 42
  output_dir: runs/smoke_pr4
  use_mock: true  # smoke 默认使用 mock executor，无需 model_client

dataset:
  path: data/smoke_samples.jsonl
  format: jsonl
  image_root: null
  ground_truth_path: null  # ground_truth 内嵌在 samples 中

prompt_structuring:
  enabled: true
  use_model_when_structure_poor: true

sampling:
  type: difficulty_frequency
  difficulty_weight: 0.7
  frequency_weight: 0.3
  ema_alpha: 0.01

prompt_optimization:
  enabled: true
  rounds: 1
  initial_batch_size: 10
  min_batch_size: 5
  max_batch_size: 20

  batch_size_controller:
    enabled: true
    growth_factor: 2.0
    decrease_factor: 0.8
    improvement_epsilon: 0.0
    shrink_on_rollback: true
    shrink_on_no_progress: true

  sampler:
    type: difficulty_frequency
    difficulty_weight: 0.7
    frequency_weight: 0.3

  extraction_prompt:
    line_limit: 300
    char_limit: 20000
    compression_enabled: true

  analysis_prompt:
    line_limit: 250
    char_limit: 16000
    compression_enabled: true

  patch:
    merge_strategy: tree_merge
    toxicity_test:
      enabled: true
      early_stop: true
      sort_by_source_difficulty: true

fewshot_optimization:
  enabled: true
  rounds: 1
  batch_size: 10
  slot_count: 3
  selection_batch_size: null
  validation_batch_size: null
  candidate_pool_size: 8
  selection_strategy: quota_diverse
  fallback_strategy: difficulty_topk
  require_no_regression: true
  min_accuracy_delta: 0.01
  require_schema_stable: true
  enable_rationale: true
  rationale_max_chars: 200
  rationale_source_preference:
    - prompt_optimization_history
    - fewshot_inline_generation
  rationale_for_candidate_types:
    - boundary
    - historical_misclassified
    - high_frequency_error
  multimodal_render_mode: multi_turn
  sampler:
    type: frequency

models: {}  # smoke 模式不配置 models，使用 mock executor
