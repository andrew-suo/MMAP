[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mmap-optimizer"
version = "0.1.0"
description = "MMAP optimizer utilities"
requires-python = ">=3.11"

[project.scripts]
mmap-optimizer = "mmap_optimizer.cli:main"

[tool.pytest.ini_options]
pythonpath = ["."]
