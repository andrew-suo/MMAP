[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mmap-optimizer"
version = "0.1.0"
description = "MMAP optimizer orchestration utilities"
requires-python = ">=3.10"

[project.scripts]
mmap-optimizer = "mmap_optimizer.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
