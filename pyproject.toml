[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "mmap-optimizer"
version = "0.1.0"
description = "Scenario-aware optimizer CLI for MMAP."
requires-python = ">=3.10"
dependencies = []

[project.scripts]
mmap-optimizer = "mmap_optimizer.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
